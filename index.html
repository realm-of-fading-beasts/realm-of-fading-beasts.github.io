<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>逐日紀 I：靡獸國</title>
<link rel="icon" type="image/png" sizes="32x32" href="assets/favicon-32x32.png?v=1">
<link rel="icon" type="image/png" sizes="16x16" href="assets/favicon-16x16.png?v=1">
<link rel="apple-touch-icon" sizes="180x180" href="assets/apple-touch-icon.png?v=1">
<link rel="shortcut icon" type="image/png" href="assets/favicon-32x32.png?v=1">
<meta name="theme-color" content="#020307">
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@300;400;500&family=Cormorant+Garamond:ital,wght@0,300;1,300&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --mist:rgba(205,225,235,.84);
  --mist-soft:rgba(165,195,210,.62);
  --ink:#020307;
}
html,body{width:100%;height:100%;overflow:hidden;background:#000;font-family:'Noto Serif TC',serif;cursor:none;color:var(--mist)}
button{font-family:inherit;color:inherit}

/* 自訂游標：水滴＋微漣漪 */
#cur{position:fixed;left:calc(var(--cur-x,50%));top:calc(var(--cur-y,50%));z-index:9999;pointer-events:none;transform:translate(-50%,-50%);mix-blend-mode:screen;will-change:transform}
#cur-drop{width:6px;height:10px;border-radius:50% 50% 55% 55%/62% 62% 38% 38%;background:rgba(198,225,238,.86);box-shadow:0 0 14px rgba(198,225,238,.22)}
#cur-ring{position:absolute;top:50%;left:50%;width:0;height:0;border-radius:50%;border:1px solid rgba(198,225,238,0);transform:translate(-50%,-50%)}
#cur-ring.go{animation:cursorRipple .55s ease-out forwards}
@keyframes cursorRipple{0%{width:0;height:0;border-color:rgba(198,225,238,.45)}100%{width:42px;height:20px;border-color:rgba(198,225,238,0)}}
/* CURSOR WARNING：最後一頁地圖靠近／撞到邊界時的黑霧提示（桌機版） */
#cur.border-near,
#cur.border-hit{
  mix-blend-mode:normal;
}
#cur::before{
  content:"";
  position:absolute;
  left:50%;
  top:50%;
  width:0;
  height:0;
  border-radius:50%;
  transform:translate(-50%,-50%) scale(.7);
  opacity:0;
  pointer-events:none;
  filter:blur(10px);
  transition:
    width .35s ease,
    height .35s ease,
    opacity .35s ease,
    filter .35s ease,
    transform .35s ease,
    background .35s ease;
}

/* 第一段：靠近邊界，RGB 123，透明度 70% */
#cur.border-near::before{
  width:68px;
  height:68px;
  opacity:1;
  filter:blur(12px);
  transform:translate(-50%,-50%) scale(1);
  background:radial-gradient(circle,
    rgba(123,123,123,.70) 0%,
    rgba(123,123,123,.46) 32%,
    rgba(123,123,123,.20) 58%,
    rgba(123,123,123,0) 82%);
}

/* 第二段：真正撞到邊界，RGB 46，透明度 70% */
#cur.border-hit::before{
  width:116px;
  height:116px;
  opacity:1;
  filter:blur(16px);
  transform:translate(-50%,-50%) scale(1.08);
  background:radial-gradient(circle,
    rgba(46,46,46,.70) 0%,
    rgba(46,46,46,.50) 34%,
    rgba(46,46,46,.24) 62%,
    rgba(46,46,46,0) 86%);
}

/* 靠近邊界時，水滴本體稍微變冷灰 */
#cur.border-near #cur-drop{
  background:rgba(210,220,224,.88);
  box-shadow:
    0 0 12px rgba(123,123,123,.42),
    0 0 30px rgba(123,123,123,.22);
}

/* 撞到邊界時，水滴被黑霧吞掉一點 */
#cur.border-hit #cur-drop{
  background:rgba(225,230,232,.92);
  box-shadow:
    0 0 14px rgba(46,46,46,.58),
    0 0 42px rgba(46,46,46,.38),
    0 0 78px rgba(46,46,46,.22);
}

/* 共用頁面 */
.page{position:fixed;inset:0;overflow:hidden;transition:opacity 1.6s ease;}
.page.out{opacity:0;pointer-events:none}
.bg-img{position:absolute;inset:0;background-size:cover;background-position:center;transform:scale(1.025);}
canvas.fx{position:absolute;inset:0;width:100%;height:100%;pointer-events:none}

/* PAGE 1：邊境黑暗 */
#p1{
  z-index:30;
  display:block;
  background:
    radial-gradient(circle at 50% 54%,rgba(18,24,29,.32),rgba(2,3,7,.96) 48%,#000 100%);
}

#p1::before{
  content:"";
  position:absolute;
  inset:-20%;
  background:
    radial-gradient(circle at 48% 48%,rgba(90,110,120,.08),transparent 34%),
    radial-gradient(circle at 65% 20%,rgba(40,55,65,.07),transparent 26%);
  filter:blur(16px);
  animation:voidBreath 9s ease-in-out infinite alternate;
}

#p1::after{
  content:"";
  position:absolute;
  inset:0;
  background-image:repeating-radial-gradient(circle at 30% 20%,rgba(255,255,255,.035) 0 1px,transparent 1px 5px);
  opacity:.16;
  mix-blend-mode:screen;
}

@keyframes voidBreath{
  from{transform:scale(1);opacity:.55}
  to{transform:scale(1.08);opacity:.92}
}

#beast-svg{
  position:absolute;
  inset:0;
  width:100%;
  height:100%;
  opacity:.035;
  filter:blur(1.8px);
  animation:beastPulse 8s ease-in-out infinite;
}

@keyframes beastPulse{
  0%,100%{opacity:.018;transform:scale(1)}
  45%{opacity:.055;transform:scale(1.018)}
  70%{opacity:.026;transform:scale(1.006)}
}

#p1-text{
  position:absolute;
  z-index:3;
  top:clamp(128px,18vh,210px);
  left:50%;
  transform:translateX(-50%);
  width:min(92vw,900px);
  max-width:900px;
  padding:0 24px;
  text-align:center;
  max-height:calc(100vh - 120px);
  overflow-y:auto;
  scrollbar-width:none;

  display:flex;
  flex-direction:column;
  align-items:center;
}

#p1-text::-webkit-scrollbar{
  display:none;
}

.para{
  min-height:1.5em;
  font-size:clamp(15px,1.65vw,20px);
  font-weight:300;
  line-height:1.92;
  letter-spacing:.018em;
  margin:0 0 .95em;
  color:rgba(215,230,238,.82);
  text-shadow:0 0 18px rgba(170,205,220,.08);
  opacity:.9;
  white-space:pre-wrap;
  word-break:normal;
  overflow-wrap:normal;
  text-wrap:pretty;
}

#para0{
  font-family:'Cormorant Garamond','Noto Serif TC',serif;
  font-size:clamp(22px,2.4vw,30px);
  font-style:italic;
  line-height:1.34;
  letter-spacing:.11em;
  color:rgba(226,238,244,.9);
  margin:0 auto 1.15em;
  max-width:12em;
}

#para1{
  max-width:23em;
  margin:0 auto 1.1em;
}

#para2{
  max-width:19em;
  margin:0 auto 1.25em;
}

/* 神話感動畫：模糊、浮現、字距收斂、冷光 */
.myth-line{
  opacity:0;
  filter:blur(6px);
  letter-spacing:.22em;
  text-shadow:0 0 0 rgba(200,230,245,0);
}

.myth-line.reveal{
  animation:mythReveal 2.2s ease forwards;
}

@keyframes mythReveal{
  0%{
    opacity:0;
    filter:blur(8px);
    letter-spacing:.34em;
    text-shadow:0 0 0 rgba(200,230,245,0);
    transform:translateY(8px);
  }
  58%{
    opacity:.88;
    filter:blur(1px);
    letter-spacing:.22em;
    text-shadow:0 0 26px rgba(190,220,235,.28);
    transform:translateY(0);
  }
  100%{
    opacity:.94;
    filter:blur(0);
    letter-spacing:.13em;
    text-shadow:0 0 18px rgba(190,220,235,.18);
    transform:translateY(0);
  }
}

/* 底部提示 */
#hint1{
  position:absolute;
  left:50%;
  bottom:52px;
  z-index:4;
  transform:translateX(-50%);
  font-size:12px;
  letter-spacing:.24em;
  color:rgba(170,198,210,.58);
  animation:softBlink 2.1s ease-in-out infinite;
  white-space:nowrap;
}

/* 必須真正消失，不能只 opacity:0 */
#hint1.gone{
  display:none !important;
  opacity:0 !important;
  visibility:hidden !important;
  pointer-events:none !important;
}

@keyframes softBlink{
  0%,100%{opacity:.45}
  50%{opacity:.95}
}

/* 進入按鈕 */
#enter1{
  display:none;
  position:relative;
  left:auto;
  bottom:auto;
  z-index:5;
  transform:none;
  margin:24px auto 0;
  border:0;
  border-bottom:1px solid rgba(190,220,232,0);
  background:none;
  padding:12px 18px 7px;
  font-size:12px;
  letter-spacing:.28em;
  color:rgba(205,230,240,0);
  cursor:none;
  pointer-events:none;
  transition:color 1.2s ease,border-color 1.2s ease,text-shadow .5s ease;
  white-space:nowrap;
}

#enter1.show{
  display:inline-block;
  color:rgba(205,230,240,.72);
  border-color:rgba(205,230,240,.28);
  pointer-events:auto;
  animation:enterPulse 2.6s ease-in-out infinite;
}

#enter1.show:hover{
  color:rgba(240,250,255,.96);
  border-color:rgba(240,250,255,.55);
  text-shadow:0 0 18px rgba(210,235,248,.36);
}

@keyframes enterPulse{
  0%,100%{opacity:.62}
  50%{opacity:1}
}

.spark{
  position:fixed;
  z-index:35;
  border-radius:50%;
  pointer-events:none;
  animation:sparkFly .74s ease-out forwards;
}

@keyframes sparkFly{
  0%{transform:translate(0,0) scale(1);opacity:1}
  100%{transform:translate(var(--tx),var(--ty)) scale(0);opacity:0}
}

.ripple-click{
  position:fixed;
  z-index:34;
  width:8px;
  height:8px;
  border-radius:50%;
  border:1px solid rgba(185,220,235,.45);
  transform:translate(-50%,-50%);
  pointer-events:none;
  animation:clickWave .7s ease-out forwards;
}

@keyframes clickWave{
  to{
    width:88px;
    height:42px;
    border-color:rgba(185,220,235,0);
    opacity:0;
  }
}

/* iPad / 平板 */
@media (min-width:761px) and (max-width:1180px){
  #p1-text{
    top:100px;
    width:min(90vw,820px);
    max-height:calc(100vh - 110px);
  }

  #para0{
    max-width:11em;
    margin:0 auto 1em;
  }

  #para1{
    max-width:21em;
    margin:0 auto 1em;
  }

  #para2{
    max-width:17.5em;
    margin:0 auto 1.1em;
  }
}

/* 手機 */
@media (max-width:760px){
  html,body{
    cursor:auto;
  }

  #cur{
    display:none;
  }

  #p1-text{
    top:88px;
    width:92vw;
    max-height:calc(100vh - 90px);
    padding:0 14px;
  }

  .para{
    font-size:clamp(13px,3.8vw,17px);
    line-height:1.8;
    letter-spacing:.012em;
    margin-bottom:.82em;
  }

  #para0{
    font-size:clamp(20px,5.6vw,29px);
    line-height:1.24;
    letter-spacing:.065em;
    max-width:10em;
    margin:0 auto .95em;
  }

  #para1{
    max-width:16em;
    margin:0 auto .9em;
  }

  #para2{
    max-width:14em;
    margin:0 auto 1em;
  }

  #enter1{
    font-size:10px;
    letter-spacing:.22em;
    margin-top:18px;
  }

  #ts-inner{
    grid-template-columns:1fr;
    gap:24px;
    padding-right:28px;
  }

  #ts-name{
    font-size:34px;
  }

  #city-btn{
    width:min(86vw,520px);
    line-height:2;
  }
}

/* 矮螢幕筆電 / 橫向手機保護 */
@media (max-height:720px) and (min-width:761px){
  #p1-text{
    top:30px;
    max-height:calc(100vh - 112px);
  }

  .para{
    line-height:1.78;
    margin-bottom:.72em;
  }

  #para0{
    line-height:1.24;
    margin-bottom:.72em;
  }

  #hint1{
    bottom:26px;
  }
}

/* TEMP POSITION LOCK：第一頁座標微調，只鎖三個位置 */
#hint1{
  left:49.8vw;
  top:81.3vh;
  bottom:auto;
  transform:translate(-50%,-50%);
  font-size: 24px;
}

#p1-text{
  top:16.5vh;
  left:50%;
  transform:translateX(-50%);
}

#enter1.show{
  display:inline-block !important;
  position:fixed !important;
  left:50vw !important;
  top:84.0vh !important;
  bottom:auto !important;
  transform:translate(-50%,-50%) !important;
  margin:0 !important;
  z-index:80 !important;
  opacity:1 !important;
  visibility:visible !important;
  color:rgba(205,230,240,.72) !important;
  border-color:rgba(205,230,240,.28) !important;
  pointer-events:auto !important;
  font-size: 18px !important;
}

/* TITLE LOCK：第一句不斷行，並使用穩定浮現動畫 */
#para0{
  max-width:none !important;
  width:max-content !important;
  white-space:nowrap !important;
  overflow-wrap:normal !important;
  word-break:keep-all !important;
  line-height:1.34 !important;
}

#para0.myth-line{
  letter-spacing:.11em !important;
  opacity:0;
  filter:blur(8px);
  transform:translateY(8px);
}

#para0.myth-line.reveal{
  animation:titleRevealStable 2.9s ease forwards !important;
}

@keyframes titleRevealStable{
  0%{
    opacity:0;
    filter:blur(14px);
    transform:translateY(12px) scale(1.12);
    text-shadow:0 0 0 rgba(200,230,245,0);
  }
  45%{
    opacity:.62;
    filter:blur(5px);
    transform:translateY(4px) scale(1.06);
    text-shadow:0 0 34px rgba(190,220,235,.22);
  }
  78%{
    opacity:.86;
    filter:blur(1.5px);
    transform:translateY(0) scale(1.015);
    text-shadow:0 0 28px rgba(190,220,235,.28);
  }
  100%{
    opacity:.94;
    filter:blur(0);
    transform:translateY(0) scale(1);
    text-shadow:0 0 18px rgba(190,220,235,.18);
  }
}


/* BODY LINE LOCK：正文只依照 data-text 裡的 &#10; 斷行 */
#para1,
#para2{
  max-width:none !important;
  width:max-content !important;
  white-space:pre !important;
  overflow-wrap:normal !important;
  word-break:keep-all !important;
}

/* PAGE 2：雨城入口 */
#p2{z-index:20;opacity:0;pointer-events:none;background:#071015}
#p2.in{opacity:1;pointer-events:auto}
#p2-bg{background-image:url('assets/city.png');z-index:1}
#p2 .veil{position:absolute;inset:0;z-index:4;background:linear-gradient(to bottom,rgba(0,0,0,.12),rgba(0,0,0,.1) 46%,rgba(2,5,9,.68) 100%),radial-gradient(circle at 50% 58%,rgba(210,225,222,.08),transparent 24%);}
#p2-rain{z-index:3}
#city-owls{position:absolute;inset:0;z-index:2;pointer-events:none}
.owl-eye-pair{position:absolute;left:0;top:0;transform:translate(-50%,-50%);display:flex;gap:var(--eye-gap,8px);opacity:.28;filter:blur(.18px);animation:owlBlink 4.6s ease-in-out infinite}
.owl-eye{width:var(--eye-size,10px);height:var(--eye-size,10px);border-radius:50%;background:rgba(243,236,191,.34);box-shadow:0 0 calc(var(--eye-size,10px)*.9) rgba(245,239,195,.22),0 0 calc(var(--eye-size,10px)*1.8) rgba(255,245,190,.1)}
.owl-eye-pair.tiny .owl-eye{background:rgba(215,230,224,.16);box-shadow:0 0 7px rgba(210,230,225,.1)}
.owl-eye-pair:nth-child(2){animation-delay:1.2s}.owl-eye-pair:nth-child(3){animation-delay:.6s}.owl-eye-pair:nth-child(4){animation-delay:2.1s}
/* OWL SOFT BEAM：貓頭鷹柔霧光，不改座標，只讓光源更自然 */
.owl-eye-pair{
  overflow:visible;
  isolation:isolate;
}

.owl-eye{
  position:relative;
  z-index:2;
  background:rgba(248,231,190,.52);
  box-shadow:
    0 0 calc(var(--eye-size,10px)*1.1) rgba(250,236,195,.36),
    0 0 calc(var(--eye-size,10px)*2.6) rgba(255,238,185,.22),
    0 0 calc(var(--eye-size,10px)*4.2) rgba(255,232,170,.09);
}

owl-eye-pair::after{
  content:"";
  position:absolute;
  left:50%;
  top:50%;
  z-index:1;
  pointer-events:none;
  width:58px;
  height:58px;
  transform:translate(-50%,-50%);
  border-radius:50%;
  background:
    radial-gradient(circle,
      rgba(255,238,190,.28) 0%,
      rgba(255,228,170,.16) 26%,
      rgba(215,228,222,.08) 48%,
      rgba(215,228,222,0) 72%);
  filter:blur(10px);
  mix-blend-mode:screen;
  opacity:.26;
  animation:owlBeamDrift 4.8s ease-in-out infinite;
}

/* 左、中、右三隻光束方向微調 */
.owl-eye-pair:nth-child(1)::after{
  width:54px;
  height:54px;
  opacity:.22;
}

.owl-eye-pair:nth-child(2)::after{
  width:62px;
  height:62px;
  opacity:.30;
}

.owl-eye-pair:nth-child(3)::after{
  width:54px;
  height:54px;
  opacity:.22;
}

/* tiny 那組先不要光束，避免右上角太亂 */
.owl-eye-pair.tiny::after{
  display:none;
}

@keyframes owlBeamDrift{
  0%,100%{
    opacity:.18;
    filter:blur(9px);
    transform:translate(-50%,-50%) scale(.92);
  }
  50%{
    opacity:.34;
    filter:blur(13px);
    transform:translate(-50%,-50%) scale(1.12);
  }
}
@keyframes owlBlink{0%,100%{opacity:.26;filter:blur(.2px)}8%{opacity:.55}10%{opacity:.1;transform:translate(-50%,-50%) scaleY(.32)}12%{opacity:.48;transform:translate(-50%,-50%) scaleY(1)}35%{opacity:.32}50%{opacity:.58}58%{opacity:.28}73%{opacity:.52}77%{opacity:.14;transform:translate(-50%,-50%) scaleY(.45)}80%{opacity:.36;transform:translate(-50%,-50%) scaleY(1)}}
#city-btn{position:absolute;left:50%;bottom:clamp(46px,8vh,90px);z-index:5;transform:translateX(-50%);border:0;border-bottom:1px solid rgba(195,223,235,.38);background:rgba(2,6,10,.08);padding:15px 28px 11px;font-size:clamp(11px,1.3vw,14px);font-weight:300;letter-spacing:.2em;color:rgba(205,230,240,.82);cursor:none;animation:buttonPulse 2.9s ease-in-out infinite;backdrop-filter:blur(2px)}
#city-btn:hover{color:rgba(245,252,255,.98);border-color:rgba(245,252,255,.62);text-shadow:0 0 24px rgba(210,235,248,.45)}
@keyframes buttonPulse{0%,100%{opacity:.62;text-shadow:none}50%{opacity:1;text-shadow:0 0 24px rgba(205,232,245,.38)}}

/* PAGE 3：霧林互動層 */
#p3{z-index:10;opacity:0;pointer-events:none;background:#d8d8d2}
#p3.in{opacity:1;pointer-events:auto}
#p3-bg{background-image:url('assets/fog_forest.png');background-position:center;filter:saturate(.85) contrast(.96);}
#p3 .veil{position:absolute;inset:0;background:radial-gradient(circle at 50% 52%,rgba(255,255,255,.1),transparent 28%),linear-gradient(to bottom,rgba(240,244,242,.18),rgba(210,218,216,.08) 45%,rgba(110,130,135,.1) 100%);pointer-events:none}
#map-title{position:absolute;top:32px;left:40px;z-index:4;pointer-events:none}
#map-title .mt1{font-size:14pt;font-weight:500;letter-spacing:.25em;color:rgb(214,247,254)}
#map-title .mt2{margin-top:6px;font-size:9pt;letter-spacing:.16em;color:rgba(214,247,254,.72)}
.hot{position:absolute;z-index:5;transform:translate(-50%,-50%);cursor:none;border:0;background:none;padding:0}
.hot-core{width:46px;height:46px;border-radius:50%;border:1px solid rgba(82,112,125,.18);display:flex;align-items:center;justify-content:center;transition:transform .35s ease,border-color .35s ease,box-shadow .35s ease;background:rgba(245,250,250,.03);backdrop-filter:blur(.6px)}
.hot:hover .hot-core{transform:scale(1.42);border-color:rgba(75,105,120,.52);box-shadow:0 0 22px rgba(120,150,160,.18)}
.hot-drop{width:6px;height:9px;border-radius:50% 50% 55% 55%/62% 62% 38% 38%;background:rgba(78,104,116,.48);box-shadow:0 0 12px rgba(255,255,255,.34);transition:background .35s,height .35s}
.hot:hover .hot-drop{height:12px;background:rgba(226,244,250,.94)}
.hot-name{position:absolute;top:calc(100% + 8px);left:50%;transform:translateX(-50%);font-size:10px;letter-spacing:.18em;white-space:nowrap;color:rgba(40,60,70,0);transition:color .35s ease;pointer-events:none;text-shadow:0 0 10px rgba(255,255,255,.25)}
.hot:hover .hot-name{color:rgba(54,76,86,.78)}
#textscape{position:fixed;inset:0;z-index:8;opacity:0;pointer-events:none;transition:opacity .9s ease;display:flex;align-items:flex-end;background:linear-gradient(160deg,rgba(2,4,8,0) 0%,rgba(2,4,8,.48) 38%,rgba(2,4,8,.96) 78%)}
#textscape.open{opacity:1;pointer-events:auto}

const cur=document.getElementById('cur');const ring=document.getElementById('cur-ring');
window.addEventListener('pointermove',e=>{cur.style.setProperty('--cur-x',e.clientX+'px');cur.style.setProperty('--cur-y',e.clientY+'px');});
function clickFX(x,y,root=document.body){const wave=document.createElement('span');wave.className='ripple-click';wave.style.left=x+'px';wave.style.top=y+'px';root.appendChild(wave);setTimeout(()=>wave.remove(),760);for(let i=0;i<12;i++){const s=document.createElement('span');s.className='spark';const a=Math.random()*Math.PI*2;const d=22+Math.random()*46;const size=2+Math.random()*3;s.style.cssText=`left:${x}px;top:${y}px;width:${size}px;height:${size}px;background:rgba(190,220,234,${.34+Math.random()*.42});--tx:${Math.cos(a)*d}px;--ty:${Math.sin(a)*d}px`;root.appendChild(s);setTimeout(()=>s.remove(),780);}}

const paras = [...document.querySelectorAll('#p1 .para')];
const hint1 = document.getElementById('hint1');
const enter1 = document.getElementById('enter1');
const p1 = document.getElementById('p1');

let introStarted = false;
let introFinished = false;

function wait(ms) {
  return new Promise(resolve => setTimeout(resolve, ms));
}

function typeText(el, text, speed = 34) {
  return new Promise(resolve => {
    if (!el) {
      resolve();
      return;
    }

    el.textContent = '';
    let i = 0;

    const timer = setInterval(() => {
      el.textContent = text.slice(0, i);
      i++;

      if (i > text.length) {
        clearInterval(timer);
        resolve();
      }
    }, speed);
  });
}
      /* 進入按鈕 */
async function startIntro() {
  if (introStarted) return;

  if (hint1) {
    hint1.classList.add('gone');
  }

  const para1 = document.getElementById('para1');

    para0.classList.add('myth-line', 'reveal');
  }

  await wait(4000);

if (para1) {
  const para1Text = window.matchMedia('(max-width: 760px)').matches
    ? (para1.dataset.mobileText || para1.dataset.text || '')
    : (para1.dataset.text || '');

  await typeText(para1, para1Text, 28);
}

  await wait(500);

  if (para2) {
    await typeText(para2, para2.dataset.text || '', 32);

  introFinished = true;

  if (hint1) {
    hint1.classList.add('gone');
    hint1.style.display = 'none';
  }

  if (enter1) {
    enter1.classList.add('show');
  }
}

if (p1) {
  p1.addEventListener('click', e => {
    if (e.target === enter1) return;

    if (typeof clickFX === 'function') {
      clickFX(e.clientX, e.clientY, p1);
    }

    startIntro();
  });
}

if (enter1) {
  enter1.addEventListener('click', e => {
    e.stopPropagation();

    if (typeof clickFX === 'function') {
      clickFX(e.clientX, e.clientY, p1);
    }

    goP2();
  });
}

/* 點擊水滴漣漪：第二頁、第三頁啟用；第四頁說明面板不啟用 */
function bindPageRipple(pageId, options = {}) {
  const page = document.getElementById(pageId);
  if (!page) return;

  page.addEventListener('click', e => {
    if (options.skipTextscape && e.target.closest('#textscape')) return;

    if (typeof clickFX === 'function') {
      clickFX(e.clientX, e.clientY, page);
    }
  }, true);
}

bindPageRipple('p2');

/* BORDER HIT TEST：桌機版地圖邊界測試，只顯示「撞到邊界」，不觸發黑幕 */
function showBorderHitTest() {
  console.log('撞到邊界');

  let tip = document.getElementById('border-hit-test');
  if (!tip) {
    tip = document.createElement('div');
    tip.id = 'border-hit-test';
    tip.textContent = '撞到邊界';
    tip.style.cssText = `
      position:fixed;
      left:50%;
      top:18%;
      transform:translate(-50%,-50%);
      z-index:13000;
      padding:10px 18px;
      border:1px solid rgba(220,235,240,.28);
      background:rgba(0,0,0,.72);
      color:rgba(225,240,246,.92);
      font:16px/1.6 "Noto Serif TC",serif;
      letter-spacing:.18em;
      pointer-events:none;
      opacity:0;
      transition:opacity .28s ease;
    `;
    document.body.appendChild(tip);
  }

  tip.style.opacity = '1';

  clearTimeout(window.__borderHitTipTimer);
  window.__borderHitTipTimer = setTimeout(() => {
    tip.style.opacity = '0';
  }, 900);
}

function bindBorderHitTest() {
  const p3 = document.getElementById('p3');
  if (!p3) return;

  p3.addEventListener('click', e => {
    /* 只限桌機版 */
    if (!window.matchMedia('(min-width: 761px)').matches) return;

    /* 只限地圖頁已開啟時 */
    if (!p3.classList.contains('in')) return;

    /* 點到地圖光點，不算撞邊界 */
    if (e.target.closest('.hot')) return;

    /* 點到地圖說明面板，不算撞邊界 */
    if (e.target.closest('#textscape')) return;

    const x = e.clientX / window.innerWidth * 100;
    const y = e.clientY / window.innerHeight * 100;

    const hitBorder =
      x < 10 ||
      x > 90 ||
      y < 12 ||
      y > 88;

    if (!hitBorder) return;

    window.previewBorderWarning();
  }, true);
}

bindBorderHitTest();
/* BORDER CURSOR STATE：最後一頁地圖靠近／撞到邊界時，游標改變 */
function bindBorderCursorState() {
  const p3 = document.getElementById('p3');
  const cur = document.getElementById('cur');

  if (!p3 || !cur) return;

  window.addEventListener('mousemove', e => {
    /* 只限桌機版 */
    if (!window.matchMedia('(min-width: 761px)').matches) {
      cur.classList.remove('border-near', 'border-hit');
      return;
    }

    /* 只限最後一頁地圖已開啟時 */
    if (!p3.classList.contains('in')) {
      cur.classList.remove('border-near', 'border-hit');
      return;
    }

    /* 點到地圖光點或說明面板時，不顯示邊界警告游標 */
    if (e.target.closest('.hot') || e.target.closest('#textscape')) {
      cur.classList.remove('border-near', 'border-hit');
      return;
    }

    const x = e.clientX / window.innerWidth * 100;
    const y = e.clientY / window.innerHeight * 100;

    /* 真正觸發黑幕的撞邊界範圍 */
    const hitBorder =
      x < 10 ||
      x > 90 ||
      y < 12 ||
      y > 88;

    /* 靠近邊界的預警範圍，比真正撞邊界再寬一點 */
    const nearBorder =
      x < 14 ||
      x > 86 ||
      y < 16 ||
      y > 84;

    cur.classList.remove('border-near', 'border-hit');

    if (hitBorder) {
      cur.classList.add('border-hit');
    } else if (nearBorder) {
      cur.classList.add('border-near');
    }
  });
}

bindBorderCursorState();
/* BORDER WARNING TEST：只供手動測試，不自動觸發 */
let borderWarningTimers = [];
let warnSound = null; // 建立全域音效變數

function clearBorderWarningTimers() {
  borderWarningTimers.forEach(t => clearTimeout(t));
  borderWarningTimers = [];
  
  // 如果有音效正在播，強制暫停並歸零
  if (warnSound) {
    warnSound.pause();
    warnSound.currentTime = 0;
  }
}

window.previewBorderWarning = function () {
  const bw = document.getElementById('border-warning');
  const count = document.getElementById('bw-count');

  if (!bw || !count) return;

  /* 手機版不測試、不啟用 */
  if (!window.matchMedia('(min-width: 761px)').matches) return;

  clearBorderWarningTimers();

  bw.classList.remove('forgot');
  bw.classList.add('show');
  bw.setAttribute('aria-hidden', 'false');
  count.textContent = '3';
  
  // 建立音效並開始播放 (確保你把檔案放在 assets/warning.mp3)
  warnSound = new Audio('assets/warning.mp3');
  warnSound.loop = false; // 絕對不重播
  warnSound.play().catch(e => console.log("等待互動後才能播放音效", e));

  borderWarningTimers.push(setTimeout(() => {
    count.textContent = '2';
  }, 1300));

  borderWarningTimers.push(setTimeout(() => {
    count.textContent = '1';
  }, 2600));

  borderWarningTimers.push(setTimeout(() => {
    bw.classList.add('forgot');
    
    // 第 3.3 秒畫面變黑的瞬間，切斷音效
    if (warnSound) {
      warnSound.pause();
      warnSound.currentTime = 0;
    }
  }, 3300));
};

window.resetBorderWarning = function () {
  const bw = document.getElementById('border-warning');
  const count = document.getElementById('bw-count');

  if (!bw || !count) return;

  clearBorderWarningTimers();

  bw.classList.remove('show', 'forgot');
  bw.setAttribute('aria-hidden', 'true');
  count.textContent = '3';
};
/* BORDER WARNING KEY TEST：B = 顯示黑幕，R = 重置 */
window.addEventListener('keydown', e => {
  const key = e.key.toLowerCase();

  if (key === 'b') {
    window.previewBorderWarning();
  }

  if (key === 'r') {
    window.resetBorderWarning();
  }
});
const CITY_IMG={w:2048,h:1152};
function positionCityOwlEyes(){
  const layer=document.getElementById('city-owls');
  if(!layer)return;
  const vw=window.innerWidth;
  const vh=window.innerHeight;
  const scale=Math.max(vw/CITY_IMG.w,vh/CITY_IMG.h);
  const drawW=CITY_IMG.w*scale;
  const drawH=CITY_IMG.h*scale;
  const offsetX=(vw-drawW)/2;
  const offsetY=(vh-drawH)/2;
  layer.querySelectorAll('.owl-eye-pair').forEach(el=>{
    const x=Number(el.dataset.x);
    const y=Number(el.dataset.y);
    const gap=Number(el.dataset.gap||8);
    const size=Number(el.dataset.size||10);
    el.style.left=(offsetX+x*scale)+'px';
    el.style.top=(offsetY+y*scale)+'px';
    el.style.setProperty('--eye-gap',(gap*scale)+'px');
    el.style.setProperty('--eye-size',(size*Math.min(Math.max(scale,.72),1.18))+'px');
  });
}

window.addEventListener('resize',positionCityOwlEyes);
function rain(canvasId,count,alpha){const c=document.getElementById(canvasId);if(!c)return;const ctx=c.getContext('2d');let drops=[];function makeDrop(){const speed=2.4+Math.random()*4.8;const len=12+Math.random()*26;return{x:Math.random()*c.width,y:Math.random()*c.height,l:len,s:speed,dx:.35+Math.random()*.65,o:alpha*(.4+Math.random()*.7),w:.7+Math.random()*.7}}function resize(){c.width=innerWidth;c.height=innerHeight;drops=Array.from({length:count},()=>makeDrop());}resize();addEventListener('resize',resize);(function loop(){ctx.clearRect(0,0,c.width,c.height);ctx.lineCap='round';for(const d of drops){ctx.lineWidth=d.w;ctx.strokeStyle=`rgba(220,238,245,${d.o})`;ctx.beginPath();ctx.moveTo(d.x,d.y);ctx.lineTo(d.x-d.dx*d.l,d.y+d.l);ctx.stroke();d.y+=d.s;d.x-=d.dx;if(d.y>c.height+40||d.x<-60){Object.assign(d,makeDrop(),{y:-40,x:Math.random()*c.width+c.width*.08});}}requestAnimationFrame(loop);})();}rain('p2-rain',170,.16);
function fog(canvasId){const c=document.getElementById(canvasId);const ctx=c.getContext('2d');let dots=[];function resize(){c.width=innerWidth;c.height=innerHeight;dots=Array.from({length:60},()=>({x:Math.random()*c.width,y:Math.random()*c.height,r:18+Math.random()*52,s:.05+Math.random()*.18,o:.018+Math.random()*.045}));}resize();addEventListener('resize',resize);(function loop(){ctx.clearRect(0,0,c.width,c.height);for(const p of dots){const g=ctx.createRadialGradient(p.x,p.y,0,p.x,p.y,p.r);g.addColorStop(0,`rgba(255,255,255,${p.o})`);g.addColorStop(1,'rgba(255,255,255,0)');ctx.fillStyle=g;ctx.beginPath();ctx.arc(p.x,p.y,p.r,0,Math.PI*2);ctx.fill();p.x+=p.s;if(p.x-p.r>c.width)p.x=-p.r;}requestAnimationFrame(loop);})();}fog('p3-fog');
